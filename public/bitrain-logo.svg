<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Isometric cube structure with gradient -->
  <defs>
    <linearGradient id="cubeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b7a9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b7eff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Top cube faces -->
  <polygon points="100,40 130,60 100,80 70,60" fill="url(#cubeGradient)" opacity="0.9"/>
  
  <!-- Left cubes -->
  <polygon points="50,80 70,60 70,90 50,110" fill="url(#cubeGradient)" opacity="0.7"/>
  <polygon points="70,90 100,80 100,110 70,120" fill="url(#cubeGradient)" opacity="0.8"/>
  
  <!-- Right cubes -->
  <polygon points="130,80 160,60 160,90 130,110" fill="url(#cubeGradient)" opacity="0.7"/>
  <polygon points="100,80 130,60 130,90 100,110" fill="url(#cubeGradient)" opacity="0.8"/>
  
  <!-- Bottom center cube -->
  <polygon points="70,120 100,110 130,120 100,130" fill="url(#cubeGradient)" opacity="0.9"/>
  
  <!-- Bottom outer cubes -->
  <polygon points="40,130 70,120 70,150 40,160" fill="url(#cubeGradient)" opacity="0.6"/>
  <polygon points="130,120 160,110 160,140 130,150" fill="url(#cubeGradient)" opacity="0.6"/>
</svg>
